# Harness DAG schema
# ──────────────────────────────────────────────────────────────────────────────
# Fields per node:
#   id            unique node identifier
#   command       skill name to invoke (must match a folder under skills/)
#   depends_on    list of upstream node ids
#   when          boolean expression — node skips if false
#   trigger_rule  default | one_success
#                   default     — fires when every dep produced a successful outcome
#                   one_success — fires as soon as one dep produced a matching outcome
#   context       default | fresh
#                   default — runs in main conversation
#                   fresh   — runs in an isolated subagent (Claude Code Task / Agent tool)
#
# Expression syntax (used in `when:`):
#   $<id>.output.<field>   value emitted by node <id> (e.g. $router.output.outcome)
#   ==                     strict string equality, no fuzzy match
#   || && ()               boolean composition
#   missing field          treated as no-match — skip this candidate, continue search
#
# Dispatch semantics:
#   - Multiple candidates match → pick the first listed in this file.
#   - Subagents (`context: fresh`) emit `next` as a hint — main thread is the dispatcher.
#   - Every skill emits {outcome, session_id, next, ...}; main thread cross-checks `next`.
# ──────────────────────────────────────────────────────────────────────────────

name: harness-default-flow
description: |
  Skill × Agent hybrid harness. Intake (clarify + tier classification) → PRD/TRD/TASKS → execute → evaluate → doc-update.
  Each node emits `$<id>.output.<field>` JSON. When `when:` is false the node skips → downstream cascades skip.

  router outcome:        casual | clarify | plan | resume
  brainstorming outcome: prd-trd | prd-only | trd-only | tasks-only | pivot | exit-casual

nodes:
  - id: router
    command: router

  - id: brainstorming
    command: brainstorming
    depends_on: [router]
    when: >-
      $router.output.outcome == 'clarify' ||
      $router.output.outcome == 'plan' ||
      $router.output.outcome == 'resume'

  - id: prd-writer
    command: prd-writer
    depends_on: [brainstorming]
    when: "$brainstorming.output.outcome == 'prd-trd' || $brainstorming.output.outcome == 'prd-only'"
    context: fresh

  - id: trd-writer
    command: trd-writer
    depends_on: [brainstorming, prd-writer]
    trigger_rule: one_success
    when: "$brainstorming.output.outcome == 'prd-trd' || $brainstorming.output.outcome == 'trd-only'"
    context: fresh

  - id: task-writer
    command: task-writer
    depends_on: [brainstorming, prd-writer, trd-writer]
    trigger_rule: one_success
    when: >-
      $brainstorming.output.outcome == 'prd-trd' ||
      $brainstorming.output.outcome == 'prd-only' ||
      $brainstorming.output.outcome == 'trd-only' ||
      $brainstorming.output.outcome == 'tasks-only'
    context: fresh

  - id: executor
    command: parallel-task-executor
    depends_on: [task-writer]

  - id: evaluator
    command: evaluator
    depends_on: [executor]
    context: fresh

  - id: doc-updater
    command: doc-updater
    depends_on: [evaluator]
    when: "$evaluator.output.outcome == 'pass'"
    context: fresh
