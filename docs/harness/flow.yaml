version: 1
name: default-flow

# ============================================================
# Runner 의미
# ------------------------------------------------------------
#   skill  — 메인 컨텍스트에서 Skill 툴로 직접 실행. 대화 이력 공유.
#   agent  — 메인 스레드가 Agent 툴로 isolated-context dispatch.
#            Agent 내부에서 동명의 skill 을 Skill 툴로 로드.
#            Agent 응답(최종 메시지)만 메인으로 되돌아옴.
#
# Dispatcher 는 없다 (2026-04-19 설계 결정).
# 메인 스레드 Claude 가 이 파일을 읽고, 각 phase 의 outcome 과
# routes / next 를 매칭해 다음 phase 를 직접 호출한다.
# ============================================================

# ============================================================
# Outcome 컨벤션
# ------------------------------------------------------------
# 모든 skill/agent 는 최종 메시지로 `outcome` 태그 JSON 하나를
# 반환한다. 메인 스레드는 이 outcome 으로 routes 키를 매칭.
#
# 공통 terminal outcome:
#   pivot        — 유저가 다른 요청으로 전환. 현재 세션 유지,
#                  다음 유저 턴에 router 가 재발화.
#   exit-casual  — 알고 보니 작업 요청이 아니었음. 세션 드롭.
# ============================================================

phases:
  - id: router
    runner: skill
    target: router
    role: "입력 분류 — casual / clarify / plan / resume"
    routes:
      casual: END
      clarify: brainstorming
      plan: classifier
      resume: classifier    # classifier Step 0 에서 재개 숏서킷

  - id: brainstorming
    runner: skill
    target: brainstorming
    role: "요청 명확화 (clarify 버킷 전용)"
    routes:
      clarified: classifier
      pivot: END            # 메인 스레드가 다음 유저 턴에 router 재호출
      exit-casual: END

  - id: classifier
    runner: skill
    target: complexity-classifier
    role: "A/B/C/D 티어 결정 + Gate 1 유저 승인 흡수"
    routes:
      # classified outcome 은 classification 필드로 추가 분기
      classified:
        by: classification
        A: prd-writer
        B: prd-writer
        C: trd-writer
        D: task-writer
      pivot: END
      exit-casual: END

  - id: prd-writer
    runner: agent
    target: prd-writer      # agents/prd-writer.md + skills/prd-writer/SKILL.md
    role: "PRD.md 생성 — 티어 독립 단일 포맷"
    next:
      # PRD 내용은 tier-independent 지만, 다음 phase 는 classifier 결과로 분기.
      by: classification
      A: trd-writer
      B: task-writer

  - id: trd-writer
    runner: agent
    target: trd-writer
    role: "TRD.md 생성 (Tier A/C)"
    next: task-writer

  - id: task-writer
    runner: agent
    target: task-writer
    role: "TASKS.md 생성 (모든 tier 공통 종착점)"
    next: executor

  - id: executor
    runner: skill
    target: parallel-task-executor
    role: "TASKS.md 파싱 + 병렬/직렬 subagent dispatch"
    # 여기서만 진짜 글루 이상의 로직 — task 의존성 분석,
    # Task tool 병렬 호출, 결과 취합, 실패 재시도.
    next: evaluator

  - id: evaluator
    runner: agent
    target: evaluator
    role: "규칙 검증 — 구현 결과가 기준 통과하는지 판정"
    routes:
      pass: doc-updater
      fail: executor        # 루프백 (실패 task 만 재실행)
    max_retries: 3
    on_max_retries: escalate  # STATE.md 에 escalated:true 기록, Stop 훅이 유저에게 전달

  - id: doc-updater
    runner: agent
    target: doc-updater
    role: "문서 영향 분석 + Gate 2 승인 후 반영"
    # Gate 2 승인은 agent 가 자체 대화로 유저에게 질의 (별도 skill 없음)
    next: END

# ============================================================
# 라우팅 의사코드 (메인 스레드가 따름)
# ------------------------------------------------------------
#   current_phase = "router"
#   loop:
#     outcome_payload = run(current_phase)
#     if current_phase has routes:
#       key = outcome_payload.outcome
#       if routes[key] has `by`: key = outcome_payload[routes[key].by]
#       next = routes[key][key_suffix] or routes[key]
#     else:
#       next = phase.next (with `by` 분기 지원)
#     if next == END: break
#     current_phase = next
#
# `max_retries` 는 메인 스레드가 STATE.md 의 retry_count 를
# 읽어 강제. on_max_retries: escalate 면 루프 탈출 + STATE 기록.
# ============================================================
